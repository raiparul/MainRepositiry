name: Scheduled Maven CI

on:
 
  schedule:
   
    - cron: '0 2 * * *'

    - cron: '0 3 * * 0'

 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Maven tests
        run: mvn clean test
